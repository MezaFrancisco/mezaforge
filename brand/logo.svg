<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 62" fill="none">
  <!-- M mark: slightly flared legs (anvil stance), cyan diamond at V-notch -->
  <g transform="translate(8,11)">
    <polyline
      points="-2,40 0,0 18,18 36,0 38,40"
      stroke="#eaeaef"
      stroke-width="6.5"
      fill="none"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />
    <polygon points="18,13 23.5,18 18,23 12.5,18" fill="#00d4ff"/>
  </g>

  <!-- Divider -->
  <line x1="58" y1="14" x2="58" y2="48" stroke="rgba(255,255,255,0.13)" stroke-width="1.5"/>

  <!-- MEZA -->
  <text
    x="70" y="36"
    font-family="Rajdhani, 'Arial Narrow', Arial, sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="3"
    fill="#eaeaef"
  >MEZA</text>

  <!-- FORGE -->
  <text
    x="70.5" y="50"
    font-family="Rajdhani, 'Arial Narrow', Arial, sans-serif"
    font-weight="600"
    font-size="11"
    letter-spacing="7"
    fill="#00d4ff"
  >FORGE</text>
</svg>

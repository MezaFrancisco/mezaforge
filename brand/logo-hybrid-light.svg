<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 62" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&amp;display=swap');</style>
  </defs>

  <!-- Double chevron mark: outer=dark, inner=dark cyan -->
  <g transform="translate(6,11)">
    <polyline points="2,38 21,12 40,38"
      stroke="#111116" stroke-width="6" fill="none"
      stroke-linecap="square" stroke-linejoin="miter"/>
    <polyline points="8,30 21,6 34,30"
      stroke="#0099bb" stroke-width="4" fill="none"
      stroke-linecap="square" stroke-linejoin="miter"/>
  </g>

  <!-- Separator -->
  <line x1="58" y1="14" x2="58" y2="48" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>

  <!-- MEZA -->
  <text x="70" y="33"
    font-family="Rajdhani,'Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="26" letter-spacing="9" fill="#111116">MEZA</text>

  <!-- Cyan rule -->
  <line x1="70" y1="40" x2="170" y2="40" stroke="#0099bb" stroke-width="1.5"/>

  <!-- FORGE -->
  <text x="70" y="52"
    font-family="Rajdhani,'Arial Narrow',Arial,sans-serif"
    font-weight="600" font-size="11" letter-spacing="13" fill="#666677">FORGE</text>
</svg>

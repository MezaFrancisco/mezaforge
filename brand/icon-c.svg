<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <rect width="60" height="60" fill="#0a0a0c" rx="8"/>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&amp;display=swap');</style>
  </defs>
  <!-- M / line / F — typographic monogram -->
  <text x="11" y="34"
    font-family="Rajdhani,'Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="26" letter-spacing="2" fill="#eaeaef">MF</text>
  <line x1="10" y1="39" x2="50" y2="39" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="11" y="52"
    font-family="Rajdhani,'Arial Narrow',Arial,sans-serif"
    font-weight="600" font-size="9" letter-spacing="5" fill="#585868">FORGE</text>
</svg>

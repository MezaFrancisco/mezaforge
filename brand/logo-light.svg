<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 62" fill="none">
  <!-- M mark: slightly flared legs (anvil stance), dark cyan diamond at V-notch -->
  <g transform="translate(8,11)">
    <polyline
      points="-2,40 0,0 18,18 36,0 38,40"
      stroke="#111116"
      stroke-width="6.5"
      fill="none"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />
    <polygon points="18,13 23.5,18 18,23 12.5,18" fill="#007a99"/>
  </g>

  <!-- Divider -->
  <line x1="58" y1="14" x2="58" y2="48" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>

  <!-- MEZA -->
  <text
    x="70" y="36"
    font-family="Rajdhani, 'Arial Narrow', Arial, sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="3"
    fill="#111116"
  >MEZA</text>

  <!-- FORGE -->
  <text
    x="70.5" y="50"
    font-family="Rajdhani, 'Arial Narrow', Arial, sans-serif"
    font-weight="600"
    font-size="11"
    letter-spacing="7"
    fill="#007a99"
  >FORGE</text>
</svg>
